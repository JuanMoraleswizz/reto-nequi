services:

  postgres:
    image: postgres:16-alpine
    container_name: franchises-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-franchises_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-franchises_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: franchises-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      R2DBC_URL: r2dbc:postgresql://postgres:5432/${POSTGRES_DB:-franchises_db}
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-franchises_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "80:8080"
    restart: unless-stopped

volumes:
  postgres_data:
